name: AFDM Intake CI Guardrails

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  guardrails:
    name: Guardrails and Node tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run CI guardrails
        run: node tools/ci/guardrails_check.js

      - name: Run full Node test suite
        shell: bash
        run: |
          mapfile -t test_files < <(find tests -type f \( -name "*.test.js" -o -name "*.spec.js" \) | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "No Node test files found under tests/"
            exit 1
          fi
          printf 'Discovered %s Node test files\n' "${#test_files[@]}"
          node --test "${test_files[@]}"
